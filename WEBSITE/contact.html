<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | Cabrito's Cake House</title>
<link rel="stylesheet" href="contact.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header>
    <div class="logo">
        <img src="CABRITOSCAKEHOUSE2.png" alt="Logo">
        <span>Cabrito's Cake House</span>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="menu.html">Menu</a>
        <a href="contactus.html">Contact Us</a>
        <a href="order.html">Order</a>
        <a href="login.html" class="btn">Login</a>
    </nav>
</header>

<!-- POPUP TOGGLE (IMPORTANT: OUTSIDE FORM) -->
<input type="checkbox" id="popup-toggle" hidden>

<section class="contact-section">

    <div class="contact-form-box">
        <h1>Contact us</h1>

        <form>

            <div class="form-row">
                <div class="input-group">
                    <label>First Name:</label>
                    <input type="text">
                </div>

                <div class="input-group">
                    <label>Mobile Number:</label>
                    <input type="text">
                </div>
            </div>

            <div class="form-row">
                <div class="input-group">
                    <label>Last Name:</label>
                    <input type="text">
                </div>

                <div class="input-group">
                    <label>Email Address:</label>
                    <input type="email">
                </div>
            </div>

            <div class="input-group full-width">
                <label>Message:</label>
                <textarea rows="5"></textarea>
            </div>

            <!-- SEND BUTTON -->
            <label for="popup-toggle" class="send-btn">
                Send Message
            </label>

        </form>
    </div>

    <div class="contact-info-box">
        <h2>Get in touch with us!</h2>

        <div class="info-item">
            <i class="fas fa-envelope"></i>
            <div>
                <strong>cabritoscakeshop@gmail.com</strong>
                <p>Email</p>
            </div>
        </div>

        <div class="info-item">
            <i class="fas fa-phone"></i>
            <div>
                <strong>+63 999 999 9999</strong>
                <p>Phone Number</p>
            </div>
        </div>

        <div class="info-item">
            <i class="fas fa-map-marker-alt"></i>
            <div>
                <strong>Sta Maria, Bulacan</strong>
                <p>Location</p>
            </div>
        </div>

        <div class="info-item">
            <i class="far fa-clock"></i>
            <div>
                <strong>10:00am - 7:00pm</strong>
                <p>Working Hours</p>
            </div>
        </div>
    </div>

</section>

<div class="popup">
    <div class="popup-box">
        <p>Message Sent!</p>
        <label for="popup-toggle" class="close-btn">OK</label>
    </div>
</div>

<footer>
    <p>© All Rights Reserved. Cabrito's Cake House 2020</p>
</footer>

</body>
</html>
