<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment | Cabrito's Cake House</title>
<link rel="stylesheet" href="order.css">
</head>

<body>

<header>
    <div class="logo">
        <img src="CABRITOSCAKEHOUSE2.png">
        <span>Cabrito's Cake House</span>
    </div>

    <nav>
        <a href="ordercake.html">Order</a>
        <a href="orderdrinks.html">Drinks</a>
        <a href="custom.html">Custom</a>
        <a href="purchis.html">Purchase History</a>
    </nav>
</header>

<div class="order-container">

    <div class="category-buttons">
        <a href="ordercake.html">Return</a>
    </div>

    <h1 class="page-title">Payment</h1>

    <!-- ORDER SUMMARY -->
    <div class="custom-box">

        <h2>Your Order Summary</h2>

        <table class="payment-table">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Qty</th>
                    <th>Total</th>
                </tr>
            </thead>

            <tbody id="paymentTable"></tbody>

            <tfoot>
                <tr>
                    <td><strong>Total</strong></td>
                    <td></td>
                    <td><strong>₱<span id="grandTotal">0</span></strong></td>
                </tr>
            </tfoot>
        </table>

    </div>

    <!-- PAYMENT FORM -->
    <div class="custom-box" style="margin-top:20px;">

        <h2>Payment Details</h2>

        <div class="form-group full">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name">
        </div>

        <div class="form-group full">
            <label>Address</label>
            <input type="text" placeholder="Delivery address">
        </div>

        <!-- ORDER TYPE -->
        <div class="form-group full">
            <label>Order Type</label>
            <select id="orderType">
                <option value="Pickup">To Pick Up</option>
                <option value="Delivery">To Deliver</option>
            </select>
        </div>

        <div class="form-group full">
            <label>Payment Method</label>
            <select id="paymentMethod">
                <option>Cash on Delivery</option>
                <option>GCash</option>
                <option>Bank Transfer</option>
            </select>
        </div>

        <div class="custom-buttons">
            <button class="btn btn-dark" id="payBtn" onclick="payNow()">Place Order</button>
        </div>

    </div>

</div>

<footer>
    <img src="CABRITOSCAKEHOUSE2.png">
    <p>© 2020 Cabrito's Cake House. All Rights Reserved.</p>
</footer>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || {};
renderPayment();
updateButton();
updatePaymentOptions(); // ✅ NEW

function renderPayment(){

    const table = document.getElementById("paymentTable");
    const total = document.getElementById("grandTotal");

    table.innerHTML = "";

    let totalPrice = 0;

    for(let item in cart){

        let product = cart[item];
        let itemTotal = product.price * product.quantity;

        let row = `
            <tr>
                <td>${item}</td>
                <td>${product.quantity}</td>
                <td>₱${itemTotal}</td>
            </tr>
        `;

        table.innerHTML += row;
        totalPrice += itemTotal;
    }

    total.textContent = totalPrice;
}

function updateButton(){

    const method = document.getElementById("paymentMethod");
    const btn = document.getElementById("payBtn");

    method.addEventListener("change", function(){

        if(this.value === "Cash on Delivery"){
            btn.textContent = "Place Order";
        } else {
            btn.textContent = "Pay Now";
        }

    });
}

/* ✅ NEW FUNCTION */
function updatePaymentOptions(){

    const orderType = document.getElementById("orderType");
    const method = document.getElementById("paymentMethod");

    function refreshOptions(){
        let selected = orderType.value;

        method.innerHTML = "";

        if(selected === "Pickup"){
            method.innerHTML = `
                <option>GCash</option>
                <option>Bank Transfer</option>
            `;
        } else {
            method.innerHTML = `
                <option>Cash on Delivery</option>
                <option>GCash</option>
                <option>Bank Transfer</option>
            `;
        }

        method.dispatchEvent(new Event("change"));
    }

    orderType.addEventListener("change", refreshOptions);
    refreshOptions();
}

function payNow(){

    const method = document.getElementById("paymentMethod").value;
    const orderType = document.getElementById("orderType").value;

    if(Object.keys(cart).length === 0){
        alert("Your cart is empty!");
        return;
    }

    let typeMessage = "";

    if(orderType === "Pickup"){
        typeMessage = "Order Type: PICK UP";
    } else {
        typeMessage = "Order Type: DELIVERY";
    }

    if(method === "Cash on Delivery"){
        alert(`Order placed successfully!\n${typeMessage}\nPlease prepare cash upon delivery.`);
    }
    else if(method === "GCash"){
        alert(`GCash selected.\n${typeMessage}\nRedirecting to payment...`);
    }
    else if(method === "Bank Transfer"){
        alert(`Bank transfer selected.\n${typeMessage}\nPlease follow instructions sent to you.`);
    }

    localStorage.removeItem("cart");
    window.location.href = "ordercake.html";
}
</script>

</body>
</html>
