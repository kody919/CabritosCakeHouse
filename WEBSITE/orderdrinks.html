<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drinks | Cabrito's Cake House</title>
<link rel="stylesheet" href="order.css">
</head>

<body>

<header>
    <div class="logo">
        <img src="CABRITOSCAKEHOUSE2.png">
        <span>Cabrito's Cake House</span>
    </div>

    <nav>
        <a href="ordercake.html">Order</a>
        <a href="purchis.html">Purchase History</a>
        <a href="user.html" class="btn btn-dark">My Profile</a>
        <a href="index.html" class="btn btn-dark">Log Out</a>
    </nav>
</header>

<div class="order-container">

    <div class="category-buttons">
        <a href="ordercake.html">Cakes</a>
        <a href="orderdrinks.html">Drinks</a>
        <a href="custom.html">Custom</a>
    </div>

    <!-- DRINK PRODUCTS -->
    <div class="product-grid">

        <div class="product-card">
            <img src="icedcoffee.webp">
            <h3>Iced Coffee</h3>
			<h3><small>₱100.00</small></h3>
            <button onclick="addToCart('Iced Coffee', 100)">Add to order</button>
        </div>

        <div class="product-card">
            <img src="tea.jpg">
            <h3>Tea</h3>
			<h3><small>₱80.00</small></h3>
            <button onclick="addToCart('Tea', 80)">Add to order</button>
        </div>

        <div class="product-card">
            <img src="hotchoco.jpg">
            <h3>Hot Chocolate</h3>
			<h3><small>₱120.00</small></h3>
            <button onclick="addToCart('Hot Chocolate', 70)">Add to order</button>
        </div>

        <div class="product-card">
            <img src="lemonade.webp">
            <h3>Lemonade</h3>
			<h3><small>₱100.00</small></h3>
            <button onclick="addToCart('Lemonade', 100)">Add to order</button>
        </div>

    </div>

    <!-- CART -->
    <div class="order-summary">

        <div class="order-table">
            <h3>Your Order</h3>

            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Qty</th>
                        <th>Price</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="orderTable"></tbody>

                <tfoot>
                    <tr class="total-row">
                        <td><strong>Total</strong></td>
                        <td></td>
                        <td><strong>₱<span id="totalPrice">0</span></strong></td>
                        <td></td>
                    </tr>
                </tfoot>

            </table>
        </div>

    </div>

    <div class="checkout">
        <a href="payment.html" class="btn btn-dark">Checkout</a>
    </div>

</div>

<footer>
    <img src="CABRITOSCAKEHOUSE2.png">
    <p>© 2020 Cabrito's Cake House. All Rights Reserved.</p>
</footer>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || {};
renderCart();

function addToCart(name, price){
    if(cart[name]){
        cart[name].quantity++;
    } else {
        cart[name] = { price, quantity: 1 };
    }
    renderCart();
}

function increaseQty(name){
    cart[name].quantity++;
    renderCart();
}

function decreaseQty(name){
    cart[name].quantity--;
    if(cart[name].quantity <= 0){
        delete cart[name];
    }
    renderCart();
}

function removeItem(name){
    delete cart[name];
    renderCart();
}

function renderCart(){
    const table = document.getElementById("orderTable");
    const total = document.getElementById("totalPrice");

    table.innerHTML = "";
    let totalPrice = 0;

    for(let item in cart){

        let product = cart[item];
        let itemTotal = product.price * product.quantity;

        let row = `
            <tr>
                <td>${item}</td>

                <td>
                    <div class="qty-control">
                        <button onclick="decreaseQty('${item}')">−</button>
                        <span>${product.quantity}</span>
                        <button onclick="increaseQty('${item}')">+</button>
                    </div>
                </td>

                <td>₱${itemTotal}</td>

                <td>
                    <button class="remove-btn" onclick="removeItem('${item}')">Remove</button>
                </td>
            </tr>
        `;

        table.innerHTML += row;
        totalPrice += itemTotal;
    }

    total.textContent = totalPrice;
    localStorage.setItem("cart", JSON.stringify(cart));
}
</script>

</body>
</html><!DOCTYPE html>
